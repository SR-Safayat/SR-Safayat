name: Generate Snake

# Controls when the action will run.
on:
  schedule:
    # Every 12 hours
    - cron: "0 */12 * * *"
  # This line lets you run the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Generates the snake
      - uses: Platane/snk@v3
        with:
          github_user_name: sr-safayat
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            
      # Pushes the generated images to the "output" branch
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
